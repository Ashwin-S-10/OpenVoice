spring.application.name=openvoice-backend

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:openvoice}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql

spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.com.openvoice=INFO

openvoice.admin.username=${ADMIN_USERNAME:admin}
openvoice.admin.password=${ADMIN_PASSWORD:admin123}

server.address=0.0.0.0
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.connection-timeout=5s